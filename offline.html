<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>অফলাইন · QuickZ</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    body { font-family: 'Hind Siliguri', sans-serif; background: #f8fafc; }
    .dark body { background: #0f172a; }
  </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">
  <div class="text-center max-w-md w-full bg-white dark:bg-slate-800 rounded-3xl shadow-xl p-8 border border-slate-100 dark:border-slate-700">
    <div class="w-24 h-24 mx-auto bg-amber-50 dark:bg-slate-700 rounded-full flex items-center justify-center mb-6">
      <i class="fas fa-wifi-slash text-5xl text-amber-500"></i>
    </div>
    <h1 class="text-3xl font-bold text-slate-800 dark:text-white mb-3">আপনি অফলাইনে আছেন</h1>
    <p class="text-slate-600 dark:text-slate-400 mb-6 bengali">
      ইন্টারনেট সংযোগ না থাকায় এই পৃষ্ঠাটি লোড করা যাচ্ছে না। কিছু পূর্বে দেখা পৃষ্ঠা এখনও কাজ করতে পারে।
    </p>
    <div class="flex flex-col gap-3">
      <button onclick="location.reload()" class="bg-indigo-600 hover:bg-indigo-700 text-white py-3 px-6 rounded-xl font-medium transition shadow-md">
        <i class="fas fa-sync-alt mr-2"></i> আবার চেষ্টা করুন
      </button>
      <a href="/" class="text-indigo-600 dark:text-indigo-400 font-medium hover:underline">হোমপেজে ফিরুন</a>
    </div>
    <p class="text-xs text-slate-400 mt-8">QuickZ · শিক্ষার ডিজিটাল রূপান্তর</p>
  </div>
</body>
</html>
